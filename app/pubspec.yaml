name: delicious
description: AI-powered food diary app

publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  dio: ^5.7.0
  go_router: ^14.2.7
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  share_plus: ^10.0.3
  cached_network_image: ^3.4.1
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4
  intl: ^0.19.0
  flutter_secure_storage: ^9.2.2
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  json_serializable: ^6.8.0
  freezed: ^2.5.7
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
